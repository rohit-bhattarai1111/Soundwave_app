# ─── CI Workflow ──────────────────────────────────────────────────────────────
#
# Runs on every push to `main` and on every pull request that targets `main`.
# A single job — "ci" — installs deps, sets up the database, builds, lints,
# runs unit tests (Vitest), and runs E2E tests (Playwright) all in one pass.
#
# WHY SQLITE MAKES CI SIMPLE:
#   A Postgres or MySQL CI setup requires a "service container" — Docker starts
#   a database server as a sidecar, and CI must wait for it to become healthy
#   (tcp port open, accept connections, etc.) before any test can run.
#   That adds ~30 s of startup, config boilerplate, and occasional flakiness.
#
#   SQLite is just a FILE. There is no server, no port, no health check.
#   `prisma migrate deploy` creates the file and applies the schema in ~1 s.
#   Each CI run starts with a brand-new empty file — perfect test isolation
#   with zero extra configuration.
#
# WHY A FRESH DATABASE ON EVERY RUN:
#   If the database were shared between runs (e.g. a persistent Postgres instance),
#   leftover rows from a previous run could cause false failures.
#   Example: the cart test adds an item, then a later run finds it still there
#   and the "empty cart" assertion fails. A fresh file eliminates this entirely.
#
# PRISMA MIGRATE DEPLOY vs. MIGRATE DEV:
#   `migrate dev`    — interactive; creates new migration files from schema changes;
#                      meant for local development only. Never use in CI.
#   `migrate deploy` — non-interactive; applies EXISTING migration files in order;
#                      designed for CI and production. It never prompts, never diffs,
#                      just runs the SQL from the migrations/ folder.
#
# GITHUB ACTIONS ARTIFACT (Playwright report):
#   An artifact is a zip of files GitHub stores alongside a workflow run.
#   Playwright generates an HTML report with screenshots and traces for every
#   failed test. Uploading it as an artifact means you can download it from the
#   Actions UI ("Artifacts" section) to diagnose failures without re-running CI.
#   We only upload on failure (if: failure()) to keep storage usage low.
#
# If ANY step exits with a non-zero status code, GitHub marks the workflow as
# failed and blocks the PR merge (when branch protection rules are configured).

name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Build, Test & E2E
    runs-on: ubuntu-latest   # fresh Linux VM for every run

    # DATABASE_URL uses an absolute path via ${{ github.workspace }} so that
    # every step — regardless of working directory — resolves to the same file.
    # This is equivalent to `file:./packages/db/prisma/test.db` when run from
    # the repo root, but is explicit so that `cd packages/db && ...` steps work
    # without accidentally pointing at a different location.
    env:
      DATABASE_URL: "file:${{ github.workspace }}/packages/db/prisma/test.db"

    steps:

      # 1. Check out the repo at the commit that triggered the workflow.
      #    Without this step the VM has an empty disk — no code to build.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install pnpm before Node so that setup-node can cache the pnpm store.
      #    Version is pinned to match `packageManager` in root package.json.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      # 3. Install Node.js 20 and cache the pnpm content-addressable store.
      #    The cache key is derived from pnpm-lock.yaml, so it only updates
      #    when dependencies actually change — fast installs on unchanged deps.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 4. Install exact dependency versions from pnpm-lock.yaml.
      #    --frozen-lockfile = npm ci equivalent: fails if the lockfile is stale
      #    rather than silently updating it. Guarantees reproducible installs.
      #    The @repo/db postinstall hook runs `prisma generate` automatically.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Generate the Prisma Client from schema.prisma.
      #    pnpm install already calls `prisma generate` via the @repo/db
      #    postinstall hook, but we run it explicitly here to make the step
      #    visible in the CI log and to ensure it uses the right schema path.
      #    No database connection is needed — this only reads the schema file
      #    and writes TypeScript types into node_modules/@prisma/client.
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      # 6. Apply migrations to create the test database file.
      #    `migrate deploy` reads every file in packages/db/prisma/migrations/
      #    and runs them in order against the DATABASE_URL defined in the env
      #    block above. On a fresh runner there is no test.db yet — Prisma
      #    creates it and runs the CREATE TABLE statements from migration.sql.
      #    This command is safe and idempotent: it skips already-applied migrations.
      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      # 7. Seed the database with initial data.
      #    seed.ts inserts 12 albums and 2 users (admin + test user) using upsert,
      #    so it is safe to re-run without creating duplicates.
      #    We run it from packages/db/ so relative imports (./client, ./data)
      #    resolve correctly. DATABASE_URL is inherited from the job env block,
      #    so the seed writes into the same test.db that migrate created above.
      - name: Seed database
        run: cd packages/db && npx tsx src/seed.ts

      # 8. Build both Next.js apps via Turborepo.
      #    `pnpm run build` → root package.json script → `turbo run build`
      #    Turbo builds packages in dependency order: shared packages first,
      #    then store and admin in parallel. TypeScript errors surface here.
      - name: Build
        run: pnpm run build

      # 9. Run ESLint across both apps.
      #    Both apps use `eslint --max-warnings 0`, so even a single warning
      #    is treated as a failure — enforces strict code-style compliance.
      - name: Lint
        run: pnpm run lint

      # 10. Run Vitest unit and component tests.
      #     Targets the @soundwave/tests-vitest workspace package.
      #     These tests mock the database — they don't touch test.db.
      - name: Test (Vitest)
        run: pnpm --filter @soundwave/tests-vitest test

      # 11. Install Chromium and its OS-level dependencies.
      #     --with-deps installs system libraries (libglib2, libnss3, etc.)
      #     that Chromium requires on Ubuntu but are not pre-installed on the
      #     GitHub runner. This step is cached between runs by Playwright.
      - name: Install Playwright Chromium
        run: pnpm --filter @soundwave/tests-playwright exec playwright install chromium --with-deps

      # 12. Run Playwright E2E tests.
      #     playwright.config.ts starts both Next.js dev servers (store + admin)
      #     automatically. global-setup.ts resets the test DB via `migrate reset`
      #     and seeds it with E2E-specific data (seed-e2e.ts) before any spec runs.
      #     DATABASE_URL is inherited from the job env so both the global setup
      #     and the web servers point at the same file.
      #
      #     No external secrets needed — the checkout uses a mock form with no
      #     real payment processor.
      - name: Run Playwright E2E tests
        run: pnpm --filter @soundwave/tests-playwright test
        env:
          CI: "true"

      # 13. Upload Playwright HTML report on failure.
      #     The report contains a timeline, screenshots (on failure), and
      #     network traces (on first retry) for every test — indispensable for
      #     diagnosing CI failures without a local repro.
      #
      #     `if: failure()` means this step ONLY runs when a previous step
      #     failed. If all tests pass, no artifact is uploaded (saves storage).
      #
      #     Find the report under Actions → your failed run → Artifacts.
      #     It is retained for 14 days, then automatically deleted by GitHub.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 14
