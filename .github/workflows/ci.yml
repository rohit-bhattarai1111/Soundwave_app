# ─── CI Workflow ──────────────────────────────────────────────────────────────
#
# Runs on every push to `main` and on every pull request that targets `main`.
# A single job — "build-and-lint" — installs deps, compiles both Next.js apps,
# and runs ESLint across the whole monorepo.
#
# If ANY step exits with a non-zero status code, GitHub marks the workflow as
# failed and blocks the PR merge (when branch protection rules are configured).

name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest   # fresh Linux VM for every run

    steps:

      # 1. Check out the repo at the commit that triggered the workflow.
      #    Without this step the VM has an empty disk — no code to build.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install pnpm before Node so that setup-node can cache the pnpm store.
      #    The version is pinned to match the `packageManager` field in package.json.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      # 3. Install Node.js 20 and tell it to cache the pnpm content-addressable
      #    store (~/.pnpm-store). Subsequent runs restore the cache and skip
      #    downloading packages that haven't changed — much faster installs.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 4. Install exact dependency versions from pnpm-lock.yaml.
      #    --frozen-lockfile = npm ci equivalent: fails if the lockfile is out of
      #    date rather than silently updating it. This guarantees reproducibility —
      #    every CI run uses the exact same package versions as the developer's machine.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build both Next.js apps via Turborepo.
      #    `pnpm run build` → root package.json script → `turbo run build`
      #    Turbo builds packages in dependency order: shared packages first,
      #    then store and admin in parallel. TypeScript errors surface here.
      - name: Build
        run: pnpm run build

      # 6. Run ESLint across both apps.
      #    Both apps use `eslint --max-warnings 0`, so even a single warning
      #    is treated as a failure. This enforces strict code-style compliance.
      - name: Lint
        run: pnpm run lint

      # 7. Run Vitest unit and component tests.
      #    Targets the @soundwave/tests-vitest workspace package which runs both
      #    the store and admin test suites. A failing test exits non-zero → CI fails.
      #    The full workflow definition lives at tests/vitest/.github/workflows/vitest.yml.
      - name: Test (Vitest)
        run: pnpm --filter @soundwave/tests-vitest test

      # 8. Playwright E2E tests are intentionally NOT run in this root CI job.
      #    They require real browser binaries, a running database, and Stripe keys —
      #    all handled by their own dedicated workflow at:
      #      .github/workflows/playwright.yml
      #    Running them here would make every push significantly slower (2–5 min).
      #    The Playwright workflow runs in parallel with this one on every push.
